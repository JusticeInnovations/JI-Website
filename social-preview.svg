<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1F35"/>
      <stop offset="100%" stop-color="#071528"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B6FE8"/>
      <stop offset="100%" stop-color="#00C2D4"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- scale of justice icon -->
  <g transform="translate(96, 200)" fill="none" stroke="#D4AA50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <line x1="60" y1="4" x2="60" y2="160"/>
    <line x1="20" y1="36" x2="100" y2="36"/>
    <line x1="20" y1="36" x2="2" y2="100"/>
    <path d="M2 100 Q11 116 20 100 Z"/>
    <line x1="100" y1="36" x2="118" y2="100"/>
    <path d="M100 100 Q109 116 118 100 Z"/>
    <line x1="40" y1="160" x2="80" y2="160"/>
    <circle cx="60" cy="34" r="5" fill="#D4AA50" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="272" font-family="Georgia, serif" font-size="72" font-weight="600" fill="#FFFFFF" letter-spacing="-1">Justice Innovations</text>

  <!-- eyebrow label -->
  <text x="242" y="220" font-family="monospace" font-size="18" fill="#FF6B6B" letter-spacing="4" text-transform="uppercase">EVIDENCE-BASED JUSTICE TECHNOLOGY</text>

  <!-- divider -->
  <rect x="240" y="300" width="720" height="1.5" fill="rgba(255,255,255,0.12)"/>

  <!-- tagline -->
  <text x="240" y="356" font-family="Georgia, serif" font-size="32" font-style="italic" fill="rgba(255,255,255,0.75)">The right call. At the right moment.</text>

  <!-- stats row -->
  <g font-family="Georgia, serif" fill="#FFFFFF">
    <text x="240" y="448" font-size="52" font-weight="600" fill="#1B6FE8">$4.6M</text>
    <text x="240" y="476" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="1">ANNUAL SAVINGS · CAMERON COUNTY</text>

    <text x="560" y="448" font-size="52" font-weight="600" fill="#00C2D4">25%</text>
    <text x="560" y="476" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="1">PRETRIAL REDUCTION</text>

    <text x="800" y="448" font-size="52" font-weight="600" fill="#D4AA50">90s</text>
    <text x="800" y="476" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="1">AVG. CALL LENGTH</text>
  </g>

  <!-- bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.25)"/>
  <text x="96" y="614" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">JUSTICEINNOVATIONS.US · HOUSTON, TEXAS · PUBLIC BENEFIT CORPORATION</text>
</svg>
